<head>
    <meta charset="UTF-8">

    <title>Fetch</title>

    <style>
        *{
            margin: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            background-color: lightcyan;
        }

        #container{
            width: 85%;
           /* background-color: lightpink;*/
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 6em;
        }
        .cart{
            height: 600px;
            width: 300px;
            background-color: white;
            margin-bottom: 4rem;
        }
        .cart-img{
            width: 90%;
            height: 40%;
           margin: auto;
        }
        .cart-img img{
            width: 100%;
            height: 100%;
            background-position: center;
            background-size: cover;
            border-radius: 12px;
        
        }
        .cart-title{
            width: 90%;
            height: 20%;
            margin-bottom: 1rem;
            margin-top: 1rem;
           
        }
        .cart-title h1{
            margin: auto;
            overflow: hidden;
        }
        .cart-description{
            height: 15%;
            width: 90%;
            margin: 1rem auto;
            font-size: 1rem;
            font-weight: 500;
            overflow: hidden;
        }
        .cart-price{
            height: 10%;
            font-size: 16px;
            font-weight: 600;
            margin-left: 5%;
        }
    </style>
</head>
